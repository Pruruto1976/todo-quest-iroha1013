<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="やること帳">
<title>やること帳 ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ff;--primary:#7c5cfc;--primary-light:#ede9ff;--accent:#ff6b9d;--gold:#ffc542;--green:#06d6a0;--red:#ff4d6d;--mission:#ff8c00;--mission-light:#fff3e0;--schedule:#0ea5e9;--schedule-light:#e0f2fe;--text:#1e1b2e;--muted:#9494b0;--radius:16px;--tab-h:64px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
.notif-banner{position:fixed;top:0;left:0;right:0;padding:14px 20px;font-size:14px;font-weight:700;z-index:500;text-align:center;transform:translateY(-100%);transition:transform .4s cubic-bezier(.34,1.56,.64,1);color:#fff;}
.notif-banner.green{background:linear-gradient(135deg,#06d6a0,#00b388);}
.notif-banner.gold{background:linear-gradient(135deg,#ffc542,#ff8c00);}
.notif-banner.show{transform:translateY(0);}
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#7c5cfc,#b06bff);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:32px;}
.login-screen.hide{display:none;}
.login-logo{font-size:64px;margin-bottom:16px;}
.login-title{color:#fff;font-size:28px;font-weight:900;margin-bottom:8px;}
.login-sub{color:rgba(255,255,255,.8);font-size:15px;margin-bottom:48px;text-align:center;}
.google-btn{background:#fff;border:none;border-radius:14px;padding:16px 28px;display:flex;align-items:center;gap:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:#1e1b2e;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.18);}
.google-icon{width:24px;height:24px;}
.login-loading{color:rgba(255,255,255,.8);font-size:14px;font-weight:700;margin-top:20px;display:none;}
.login-err{color:#ffd166;font-size:13px;font-weight:700;margin-top:12px;min-height:20px;text-align:center;}
.hdr{background:linear-gradient(135deg,#7c5cfc,#b06bff);padding:env(safe-area-inset-top,0) 16px 0;flex-shrink:0;}
.hdr-inner{padding:12px 0 12px;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr-title{color:#fff;font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;}
.hdr-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.6);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.pt-chip{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.45);border-radius:50px;padding:6px 14px;color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;gap:5px;}
.logout-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:50px;padding:6px 12px;color:#fff;font-weight:700;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;}
.tabs{display:flex;background:#fff;border-top:1px solid #ece9f5;flex-shrink:0;height:var(--tab-h);padding-bottom:env(safe-area-inset-bottom,0);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;color:var(--muted);cursor:pointer;gap:2px;position:relative;}
.tab .ti{font-size:20px;}
.tab.active{color:var(--primary);}
.tab-badge{position:absolute;top:6px;right:calc(50% - 16px);background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:800;}
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:none;}
.page.active{display:block;}
.sec-ttl{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;}
.home-hero{background:linear-gradient(135deg,#7c5cfc,#b06bff);border-radius:var(--radius);padding:20px;margin-bottom:12px;color:#fff;}
.home-hero-name{font-size:15px;font-weight:700;opacity:.9;margin-bottom:4px;}
.home-hero-pts{font-size:40px;font-weight:900;line-height:1;margin-bottom:12px;}
.home-hero-pts span{font-size:16px;font-weight:700;opacity:.8;}
.prog-wrap{background:rgba(255,255,255,.2);border-radius:100px;height:8px;overflow:hidden;margin-bottom:6px;}
.prog-bar{height:100%;background:linear-gradient(90deg,#ffd166,#ff6b9d);border-radius:100px;transition:width .6s;}
.prog-lbl{font-size:12px;font-weight:700;opacity:.85;}
.miss-strip{background:linear-gradient(135deg,#ff8c00,#ffc542);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;color:#fff;}
.miss-strip-icon{font-size:28px;}
.miss-strip-body{flex:1;}
.miss-strip-title{font-weight:900;font-size:14px;}
.miss-strip-sub{font-size:12px;opacity:.9;margin-top:2px;}
.miss-count{background:rgba(255,255,255,.25);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;}
.tracker-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.tracker-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.tracker-name{font-weight:800;font-size:14px;}
.tracker-num{font-size:13px;font-weight:700;color:var(--primary);}
.tracker-bar-wrap{background:#f0eeff;border-radius:100px;height:10px;overflow:hidden;}
.tracker-bar{height:100%;background:linear-gradient(90deg,#7c5cfc,#b06bff);border-radius:100px;transition:width .6s;}
.tracker-foot{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);font-weight:600;}
.tc{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.05);animation:si .25s ease;}
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tc.done{opacity:.45;}
.tc.done .tc-name{text-decoration:line-through;color:var(--muted);}
.tc.mission-card{border-left:4px solid var(--mission);}
.tc.overdue-card{border-left:4px solid var(--red);}
.chk{width:34px;height:34px;border-radius:50%;border:2.5px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;flex-shrink:0;}
.chk.on{background:var(--green);border-color:var(--green);color:#fff;}
.tc-body{flex:1;min-width:0;}
.tc-name{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tc-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;border-radius:50px;padding:2px 8px;color:#fff;}
.badge-miss{background:var(--mission);}
.badge-pt{background:transparent;color:var(--gold);font-size:11px;font-weight:800;}
.badge-date{font-size:10px;color:var(--muted);font-weight:600;}
.badge-date.od{color:var(--red);font-weight:800;}
.miss-time{font-size:10px;color:var(--mission);font-weight:700;}
.tc-actions{display:flex;gap:4px;}
.edit-btn{background:none;border:none;font-size:17px;cursor:pointer;color:#aaa;padding:4px;}
.edit-btn:active{color:var(--primary);}
.del-btn{background:none;border:none;font-size:17px;cursor:pointer;color:#ccc;padding:4px;}
.del-btn:active{color:var(--red);}
.rwd-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:9px;box-shadow:0 2px 10px rgba(0,0,0,.05);display:flex;align-items:center;gap:12px;}
.rwd-ic{font-size:30px;}
.rwd-info{flex:1;}
.rwd-name{font-weight:800;font-size:14px;}
.rwd-cost{font-size:12px;color:var(--accent);font-weight:700;margin-top:2px;}
.rwd-status{font-size:11px;font-weight:700;border-radius:50px;padding:3px 10px;}
.rwd-status.pending{background:#fff3e0;color:var(--mission);}
.rwd-status.approved{background:#e8fdf5;color:var(--green);}
.rwd-btn{border:none;border-radius:10px;padding:8px 13px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;background:var(--primary-light);color:var(--primary);}
.rwd-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-nav-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 10px;border-radius:10px;color:var(--primary);}
.cal-month{font-size:17px;font-weight:900;}
/* カレンダーは画面幅いっぱいに、paddingを0にして余白をなくす */
.cal-wrap{margin:0 -14px;padding:0 8px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:14px;width:100%;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding-bottom:4px;}
.cal-dow.sun{color:#ff6b9d;}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:3px;cursor:pointer;font-size:12px;font-weight:700;position:relative;background:transparent;border:none;font-family:'Nunito',sans-serif;color:var(--text);overflow:hidden;min-width:0;}
.cal-day.other-month{color:#ccc;}
.cal-day.today{background:var(--primary);color:#fff !important;box-shadow:0 3px 10px rgba(124,92,252,.4);}
.cal-day.selected:not(.today){background:var(--primary-light);color:var(--primary);}
.cal-day.has-mission::after{content:'🔥';position:absolute;top:-2px;right:-2px;font-size:8px;}
.cal-day.sun-col{color:#ff6b9d;}
.cal-day.sun-col.today{color:#fff !important;}
.cal-tasks-preview{display:flex;flex-direction:column;gap:1px;width:100%;margin-top:2px;padding:0 1px;}
.cal-task-dot{font-size:6px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center;color:var(--muted);background:var(--primary-light);border-radius:2px;padding:1px;}
.cal-task-dot.is-schedule{background:var(--schedule-light);color:var(--schedule);}
.cal-day.today .cal-task-dot{background:rgba(255,255,255,.25);color:#fff;}

.day-header{font-size:15px;font-weight:900;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.day-header span{color:var(--primary);}
.add-schedule-btn{background:var(--schedule-light);border:none;border-radius:10px;padding:7px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--schedule);cursor:pointer;}
.sc-item{background:var(--schedule-light);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border-left:4px solid var(--schedule);}
.sc-icon{font-size:22px;}
.sc-body{flex:1;}
.sc-name{font-size:14px;font-weight:700;color:var(--schedule);}
.sc-time{font-size:11px;color:var(--schedule);opacity:.8;margin-top:2px;}
.sc-del{background:none;border:none;font-size:16px;cursor:pointer;color:#aaa;}
.rg-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.rg-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rg-icon{font-size:24px;}
.rg-info{flex:1;}
.rg-name{font-weight:800;font-size:14px;}
.rg-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.rg-actions{display:flex;gap:6px;}
.rg-edit-btn{background:var(--primary-light);border:none;border-radius:8px;padding:6px 10px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--primary);cursor:pointer;}
.rg-del-btn{background:#fee;border:none;border-radius:8px;padding:6px 10px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--red);cursor:pointer;}
.parent-section{margin-bottom:20px;}
.parent-ttl{font-size:16px;font-weight:900;margin-bottom:10px;}
.approval-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:9px;box-shadow:0 2px 10px rgba(0,0,0,.05);display:flex;align-items:center;gap:12px;}
.approval-info{flex:1;}
.approval-name{font-weight:800;font-size:14px;}
.approval-pts{font-size:13px;color:var(--accent);font-weight:700;}
.approve-btn{background:var(--green);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.reject-btn{background:#fee;border:none;border-radius:10px;padding:8px 14px;color:var(--red);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;margin-left:6px;}
.pt-adjust{display:flex;align-items:center;gap:10px;background:#fff;border-radius:var(--radius);padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.pt-adj-btn{width:36px;height:36px;border-radius:50%;border:none;font-size:20px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.pt-adj-minus{background:#fee;color:var(--red);}
.pt-adj-plus{background:#e8fdf5;color:var(--green);}
.pt-adj-val{font-size:28px;font-weight:900;flex:1;text-align:center;}
.pt-adj-apply{background:var(--primary);border:none;border-radius:10px;padding:10px 16px;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}
.fab{position:fixed;bottom:calc(var(--tab-h) + 16px);right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7c5cfc,#b06bff);border:none;color:#fff;font-size:26px;box-shadow:0 5px 20px rgba(124,92,252,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;}
.fab:active{transform:scale(.93);}
.overlay{display:none;position:fixed;inset:0;background:rgba(20,15,40,.5);z-index:100;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 18px calc(24px + env(safe-area-inset-bottom,0));width:100%;max-width:480px;animation:su .3s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:#e0e0ee;border-radius:100px;margin:0 auto 18px;}
.modal-ttl{font-size:18px;font-weight:900;text-align:center;margin-bottom:18px;}
.fg{margin-bottom:13px;}
.fl{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;}
.fi{width:100%;padding:11px 13px;border:2px solid #eee;border-radius:11px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--primary);}
.cat-sel-row{display:flex;gap:7px;flex-wrap:wrap;}
.cs-btn{border:2px solid #eee;border-radius:10px;padding:7px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--text);}
.cs-btn.on{color:#fff;border-color:transparent;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:#f8f6ff;border-radius:12px;padding:12px 14px;margin-bottom:4px;}
.toggle-label{font-size:14px;font-weight:700;}
.toggle-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.toggle{width:46px;height:26px;background:#ddd;border-radius:100px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0;}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.toggle.on{background:var(--mission);}
.toggle.on::after{transform:translateX(20px);}
.toggle.on-blue{background:var(--schedule);}
.mission-fields{background:var(--mission-light);border-radius:12px;padding:12px;margin-top:4px;border:1.5px solid #ffd4a0;}
.mission-fields .fl{color:var(--mission);}
.repeat-fields{background:#f0eeff;border-radius:12px;padding:12px;margin-top:4px;border:1.5px solid #c4b5fd;}
.dow-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.dow-btn{width:36px;height:36px;border-radius:50%;border:2px solid #ddd;background:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dow-btn.on{background:var(--primary);border-color:var(--primary);color:#fff;}
.sub-btn{width:100%;padding:15px;border-radius:13px;border:none;background:linear-gradient(135deg,#7c5cfc,#b06bff);color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin-top:6px;box-shadow:0 4px 16px rgba(124,92,252,.4);}
.sub-btn.green{background:linear-gradient(135deg,#06d6a0,#00b388);box-shadow:0 4px 16px rgba(6,214,160,.3);}
.sub-btn.blue{background:linear-gradient(135deg,#0ea5e9,#0284c7);box-shadow:0 4px 16px rgba(14,165,233,.3);}
.sub-btn.orange{background:linear-gradient(135deg,#ff8c00,#ffc542);box-shadow:0 4px 16px rgba(255,140,0,.3);}
.toast{position:fixed;bottom:calc(var(--tab-h) + 14px);left:50%;transform:translateX(-50%) translateY(10px);background:#1e1b2e;color:#fff;padding:10px 22px;border-radius:50px;font-weight:700;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.bad{background:var(--red);}
.pen-overlay{display:none;position:fixed;inset:0;background:rgba(20,15,40,.5);z-index:200;align-items:center;justify-content:center;}
.pen-overlay.open{display:flex;}
.pen-modal{background:#fff;border-radius:24px;padding:28px 22px;width:calc(100% - 40px);max-width:340px;text-align:center;animation:pop .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.pen-ic{font-size:56px;margin-bottom:10px;}
.pen-ttl{font-size:20px;font-weight:900;margin-bottom:6px;}
.pen-sub{font-size:14px;color:var(--muted);margin-bottom:16px;}
.pen-num{font-size:36px;font-weight:900;color:var(--red);margin-bottom:20px;}
.pen-ok{width:100%;padding:14px;border-radius:13px;border:none;background:var(--primary);color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.empty{text-align:center;padding:36px 16px;color:var(--muted);}
.empty-ic{font-size:44px;margin-bottom:8px;}
.empty-tx{font-size:14px;font-weight:700;}
</style>
</head>
<body>

<div class="notif-banner" id="notif-banner"></div>

<div class="login-screen" id="login-screen">
  <div class="login-logo">⭐</div>
  <div class="login-title">やること帳</div>
  <div class="login-sub">Googleアカウントでログインしてね</div>
  <button class="google-btn" id="login-btn" onclick="loginWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Googleでログイン
  </button>
  <div class="login-loading" id="login-loading">ログイン中...しばらくお待ちください</div>
  <div class="login-err" id="login-err"></div>
</div>

<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-row">
      <div class="hdr-title">
        <img class="hdr-avatar" id="hdr-avatar" src="" style="display:none">
        <span id="hdr-name">やること帳</span>
      </div>
      <div class="hdr-right">
        <div class="pt-chip">🪙 <span id="hpt">0</span>pt</div>
        <button class="logout-btn" onclick="doLogout()">ログアウト</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWgmu91yK_2SxMmb2vvzGSn97NXou93g8",
  authDomain: "task-app-ae81a.firebaseapp.com",
  projectId: "task-app-ae81a",
  storageBucket: "task-app-ae81a.firebasestorage.app",
  messagingSenderId: "441639308528",
  appId: "1:441639308528:web:1b67742f2bb27d4b304635"
};

const ALLOWED_EMAILS = ["ruhitonium@gmail.com","ricopin1013@gmail.com"];
const PARENT_EMAILS  = ["ruhitonium@gmail.com"];
const REWARDS_DEFAULT = [
  {id:'r1',name:'ゲーム30分',icon:'🎮',cost:50},
  {id:'r2',name:'おやつ1個',icon:'🍪',cost:30},
  {id:'r3',name:'好きな夕ごはん',icon:'🍕',cost:100},
  {id:'r4',name:'映画をみる',icon:'🎬',cost:80},
  {id:'r5',name:'文房具を買ってもらう',icon:'✏️',cost:150},
];
const CATS = [
  {id:'study',label:'勉強',emoji:'📚',color:'#7c5cfc'},
  {id:'sport',label:'運動',emoji:'⚽',color:'#06d6a0'},
  {id:'home', label:'おてつだい',emoji:'🏠',color:'#ffc542'},
  {id:'life', label:'生活',emoji:'🌟',color:'#ff6b9d'},
  {id:'other',label:'その他',emoji:'💫',color:'#a78bfa'},
];
// 月曜始まりの曜日ラベル（0=月,1=火,...,6=日）
const DOW_LABELS_MON = ['月','火','水','木','金','土','日'];

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

let tasks=[],points=0,trackers=[],rewardRequests=[],schedules=[];
let calYear,calMonth,selDate;
let selectedCat='study',editCat='study',rgEditCat='study';
let isMission=false,isRepeat=false,selectedDows=[];
let penaltyQueue=[],currentUser=null,isParent=false;
let unsubTasks=null,unsubPoints=null,unsubTrackers=null,unsubRequests=null,unsubSchedules=null;
let adjAmount=0,childUid=null;

function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getCat(id){return CATS.find(c=>c.id===id)||CATS[4];}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getUid(){return isParent&&childUid?childUid:currentUser.uid;}
// 月曜始まりの曜日インデックス（月=0, 火=1, ... 日=6）
function monFirstDow(date){return (date.getDay()+6)%7;}

function showBanner(msg,type='green'){
  const el=document.getElementById('notif-banner');
  el.textContent='🔔 '+msg;
  el.className=`notif-banner ${type} show`;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),4000);
}

document.getElementById('login-loading').style.display='none';
document.getElementById('login-btn').style.display='flex';

window.loginWithGoogle=async function(){
  document.getElementById('login-err').textContent='';
  document.getElementById('login-btn').style.display='none';
  document.getElementById('login-loading').style.display='block';
  try{await signInWithPopup(auth,new GoogleAuthProvider());}
  catch(popupError){
    try{await signInWithRedirect(auth,new GoogleAuthProvider());}
    catch(e){
      document.getElementById('login-err').textContent='ログインに失敗しました';
      document.getElementById('login-loading').style.display='none';
      document.getElementById('login-btn').style.display='flex';
    }
  }
};
window.doLogout=async function(){
  if(!confirm('ログアウトしますか？'))return;
  [unsubTasks,unsubPoints,unsubTrackers,unsubRequests,unsubSchedules].forEach(u=>u&&u());
  await signOut(auth);
};

onAuthStateChanged(auth,async user=>{
  if(user&&ALLOWED_EMAILS.includes(user.email)){
    currentUser=user;
    isParent=PARENT_EMAILS.includes(user.email);
    document.getElementById('login-screen').classList.add('hide');
    const name=user.displayName?.split(' ')[0]||'きみ';
    document.getElementById('hdr-name').textContent=name+'のやること帳';
    document.getElementById('home-name').textContent=name+'のやること帳へようこそ！';
    const avatar=document.getElementById('hdr-avatar');
    if(user.photoURL){avatar.src=user.photoURL;avatar.style.display='block';}
    if(!isParent){
      document.getElementById('parent-tab').style.display='none';
      await setDoc(doc(db,'app','childUid'),{uid:user.uid,email:user.email});
    } else {
      document.getElementById('repeat-group-section').style.display='block';
      try{const snap=await getDoc(doc(db,'app','childUid'));if(snap.exists())childUid=snap.data().uid;}catch(e){}
    }
    startListeners();
    initCalendar();
  } else {
    currentUser=null;
    document.getElementById('login-screen').classList.remove('hide');
    document.getElementById('login-loading').style.display='none';
    document.getElementById('login-btn').style.display='flex';
    tasks=[];points=0;trackers=[];rewardRequests=[];schedules=[];
    [unsubTasks,unsubPoints,unsubTrackers,unsubRequests,unsubSchedules].forEach(u=>u&&u());
  }
});

function startListeners(){
  const uid=getUid();
  unsubTasks=onSnapshot(collection(db,'users',uid,'tasks'),snap=>{tasks=snap.docs.map(d=>({id:d.id,...d.data()}));checkPenalties();renderAll();});
  unsubPoints=onSnapshot(doc(db,'users',uid,'meta','points'),snap=>{points=snap.exists()?(snap.data().value||0):0;adjAmount=points;document.getElementById('adj-val').textContent=points;renderAll();});
  unsubTrackers=onSnapshot(collection(db,'users',uid,'trackers'),snap=>{trackers=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
  unsubRequests=onSnapshot(collection(db,'users',uid,'rewardRequests'),snap=>{rewardRequests=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
  unsubSchedules=onSnapshot(collection(db,'users',uid,'schedules'),snap=>{schedules=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
  if(isParent&&childUid){
    onSnapshot(doc(db,'users',childUid,'notifications','toParent'),snap=>{
      if(snap.exists()&&!snap.data().read){showBanner(snap.data().message,'gold');updateDoc(doc(db,'users',childUid,'notifications','toParent'),{read:true});}
    });
  }
  if(!isParent){
    onSnapshot(doc(db,'users',currentUser.uid,'notifications','toChild'),snap=>{
      if(snap.exists()&&!snap.data().read){showBanner(snap.data().message,'green');renderAll();updateDoc(doc(db,'users',currentUser.uid,'notifications','toChild'),{read:true});}
    });
  }
}

function checkPenalties(){
  const now=new Date(),today=todayStr();
  tasks.forEach(t=>{
    if(!t.mission||t.done||t.penalized)return;
    const expired=(t.date&&t.date<today)||(t.date===today&&t.time&&(()=>{const[hh,mm]=t.time.split(':').map(Number);const dl=new Date();dl.setHours(hh,mm,0,0);return now>dl;})());
    if(expired){const pen=t.penalty||20,uid=getUid();updateDoc(doc(db,'users',uid,'tasks',t.id),{penalized:true});setDoc(doc(db,'users',uid,'meta','points'),{value:Math.max(0,points-pen)});penaltyQueue.push({name:t.name,pen});}
  });
  if(penaltyQueue.length>0)showNextPenalty();
}
function showNextPenalty(){if(!penaltyQueue.length)return;const{name,pen}=penaltyQueue.shift();document.getElementById('pen-task-name').textContent=name;document.getElementById('pen-amount').textContent=`-${pen}pt`;document.getElementById('pen-overlay').classList.add('open');}
window.closePenalty=function(){document.getElementById('pen-overlay').classList.remove('open');if(penaltyQueue.length>0)setTimeout(showNextPenalty,400);};

function renderAll(){renderHeader();renderHome();renderTasks();renderRewards();renderCalendar();renderDayItems();renderRepeatGroups();renderParent();}

function renderHeader(){document.getElementById('hpt').textContent=points;document.getElementById('home-pts').textContent=points;}

function renderHome(){
  const today=todayStr(),tt=tasks.filter(t=>t.date===today);
  const done=tt.filter(t=>t.done).length,total=tt.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('plbl').textContent=`今日: ${done}/${total} 完了 (${pct}%)`;
  const ms=tasks.filter(t=>t.mission&&t.date===today&&!t.done&&!t.penalized);
  const banner=document.getElementById('mission-banner-home');
  if(ms.length){const m=ms[0];banner.innerHTML=`<div class="miss-strip"><div class="miss-strip-icon">🔥</div><div class="miss-strip-body"><div class="miss-strip-title">${esc(m.name)}</div><div class="miss-strip-sub">${m.time?`⏰ ${m.time}まで`:' 今日中に！'} 未完了で -${m.penalty||20}pt</div></div><div class="miss-count">${ms.length}件</div></div>`;}
  else banner.innerHTML='';
  const tList=document.getElementById('tracker-list');
  if(!trackers.length){tList.innerHTML=`<div class="empty"><div class="empty-ic">📊</div><div class="empty-tx">保護者画面からトラッカーを追加してね</div></div>`;}
  else{tList.innerHTML=trackers.map(tr=>{const p2=tr.goal?Math.min(100,Math.round((tr.current||0)/tr.goal*100)):0;return`<div class="tracker-card"><div class="tracker-top"><div class="tracker-name">${esc(tr.name)}</div><div class="tracker-num">${tr.current||0} / ${tr.goal} ${esc(tr.unit||'')}</div></div><div class="tracker-bar-wrap"><div class="tracker-bar" style="width:${p2}%"></div></div><div class="tracker-foot"><span>0</span><span>${p2}%</span><span>${tr.goal}</span></div></div>`;}).join('');}
  const homeTaskList=document.getElementById('home-task-list');
  if(tt.length){homeTaskList.innerHTML='<div class="sec-ttl">📋 今日のタスク</div>'+[...tt].sort((a,b)=>(b.mission?1:0)-(a.mission?1:0)).map(taskCardHTML).join('');}
  else homeTaskList.innerHTML='';
}

function renderTasks(){
  const list=document.getElementById('task-list');
  const today=todayStr();
  const todayPending=tasks.filter(t=>t.date===today&&!t.done);
  if(!todayPending.length){list.innerHTML=`<div class="empty"><div class="empty-ic">🎉</div><div class="empty-tx">今日のタスクは全部完了！</div></div>`;return;}
  list.innerHTML=[...todayPending].sort((a,b)=>(b.mission?1:0)-(a.mission?1:0)).map(taskCardHTML).join('');
}

function taskCardHTML(t){
  const cat=getCat(t.cat),today=todayStr(),overdue=t.date&&t.date<today&&!t.done;
  let dateLbl=t.date?(overdue?`<span class="badge-date od">⚠️ ${t.date}</span>`:t.date===today?`<span class="badge-date">📅 今日</span>`:`<span class="badge-date">📅 ${t.date}</span>`):'';
  const timeLbl=(t.mission&&t.time)?`<span class="miss-time">⏰ ${t.time}まで</span>`:'';
  const missBadge=t.mission?`<span class="badge badge-miss">🔥ミッション</span>`:'';
  const penBadge=t.penalized?`<span class="badge" style="background:#ccc">ペナルティ済</span>`:'';

function renderCalendar(){
  if(!calYear)return;
  document.getElementById('cal-month-lbl').textContent=`${calYear}年 ${calMonth+1}月`;
  const grid=document.getElementById('cal-grid');
  // 月曜始まりの曜日ヘッダー（日曜は赤）
  let html=DOW_LABELS_MON.map((d,i)=>`<div class="cal-dow${i===6?' sun':''}">${d}</div>`).join('');
  // 月の1日が週の何番目か（月曜=0）
  const firstDay=new Date(calYear,calMonth,1);
  const firstDowMon=monFirstDow(firstDay);
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=todayStr();
  // 前月の埋め
  for(let i=firstDowMon-1;i>=0;i--){
    const day=prevDays-i;
    html+=`<button class="cal-day other-month" onclick="selectDay(${calYear},${calMonth-1},${day})">${day}</button>`;
  }
  // 当月
  for(let day=1;day<=daysInMonth;day++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=ds===today,isSel=ds===selDate;
    const dayDate=new Date(calYear,calMonth,day);
    const isSun=dayDate.getDay()===0;
    const dayTasks=tasks.filter(t=>t.date===ds);
    const daySch=schedules.filter(s=>s.date===ds);
    const hasMiss=dayTasks.some(t=>t.mission);
    let cls='cal-day';
    if(isToday)cls+=' today';else if(isSel)cls+=' selected';
    if(hasMiss)cls+=' has-mission';
    if(isSun)cls+=' sun-col';
    const items=[
      ...dayTasks.slice(0,1).map(t=>`<div class="cal-task-dot">${getCat(t.cat).emoji}${esc(t.name)}</div>`),
      ...daySch.slice(0,1).map(s=>`<div class="cal-task-dot is-schedule">📌${esc(s.name)}</div>`)
    ];
    html+=`<button class="${cls}" onclick="selectDay(${calYear},${calMonth},${day})">${day}<div class="cal-tasks-preview">${items.slice(0,2).join('')}</div></button>`;
  }
  // 次月の埋め
  const totalCells=firstDowMon+daysInMonth;
  const rem=totalCells%7===0?0:7-(totalCells%7);
  for(let i=1;i<=rem;i++)html+=`<button class="cal-day other-month" onclick="selectDay(${calYear},${calMonth+1},${i})">${i}</button>`;
  grid.innerHTML=html;
}

window.toggleTask=async function(id){
  if(!currentUser)return;
  const t=tasks.find(t=>t.id===id);if(!t)return;
  if(!t.done&&!confirm(`「${t.name}」を完了にする？`))return;
  const newDone=!t.done,uid=getUid();
  await updateDoc(doc(db,'users',uid,'tasks',id),{done:newDone});
  const newPts=newDone?points+t.pts:Math.max(0,points-t.pts);
  await setDoc(doc(db,'users',uid,'meta','points'),{value:newPts});
  if(t.trackerId&&t.trackerVal){
    const tr=trackers.find(tr=>tr.id===t.trackerId);
    if(tr){const newVal=newDone?(tr.current||0)+Number(t.trackerVal):Math.max(0,(tr.current||0)-Number(t.trackerVal));await updateDoc(doc(db,'users',uid,'trackers',t.trackerId),{current:newVal});}
  }
  if(newDone){
    const today=todayStr();
    const todayTasks=tasks.filter(t=>t.date===today);
    const allDone=todayTasks.every(t=>t.id===id?true:t.done);
    if(allDone&&todayTasks.length>0){await setDoc(doc(db,'users',uid,'notifications','toParent'),{message:'今日のタスクを全部完了したよ！🎉',read:false,createdAt:Date.now()});}
  }
  toast(newDone?`+${t.pts}pt ゲット！🎉`:'未完了に戻したよ');
};

window.addTask=async function(){
  if(!currentUser)return;
  const name=document.getElementById('inp-name').value.trim();
  if(!name){toast('タスク名を入力してね！','bad');return;}
  const trackerId=document.getElementById('inp-tracker').value;
  const trackerVal=parseInt(document.getElementById('inp-tracker-val').value)||0;
  const uid=getUid();
  const baseTask={name,cat:selectedCat,pts:parseInt(document.getElementById('inp-pts').value)||10,mission:isMission,done:false,penalized:false,trackerId:trackerId||null,trackerVal:trackerId?trackerVal:0,createdAt:Date.now()};
  if(isMission){baseTask.time=document.getElementById('inp-time').value||null;baseTask.penalty=parseInt(document.getElementById('inp-pen').value)||20;}
  if(!isRepeat){
    baseTask.date=document.getElementById('inp-date').value;
    await addDoc(collection(db,'users',uid,'tasks'),baseTask);
    if(baseTask.date)selDate=baseTask.date;
    toast('タスクを追加したよ📝');
  } else {
    const type=document.getElementById('inp-repeat-type').value;
    const startStr=document.getElementById('inp-repeat-start').value;
    const endStr=document.getElementById('inp-repeat-end').value;
    if(!startStr||!endStr){toast('開始日と終了日を入力してね','bad');return;}
    if(type==='weekly'&&selectedDows.length===0){toast('曜日を選択してね','bad');return;}
    const startD=new Date(startStr),endD=new Date(endStr);
    const maxEnd=new Date(startStr);maxEnd.setMonth(maxEnd.getMonth()+3);
    if(endD>maxEnd){toast('終了日は開始から3ヶ月以内にしてね','bad');return;}
    if(endD<startD){toast('終了日が開始日より前になってるよ','bad');return;}
    const dates=[];
    const cur=new Date(startStr);
    while(cur<=endD){
      const dow=cur.getDay();
      if(type==='daily'||(type==='weekly'&&selectedDows.includes(dow))){
        dates.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`);
      }
      cur.setDate(cur.getDate()+1);
    }
    if(dates.length===0){toast('該当する日付がないよ','bad');return;}
    const groupId=`rg_${Date.now()}`;
    for(let i=0;i<dates.length;i+=490){const batch=writeBatch(db);dates.slice(i,i+490).forEach(date=>{batch.set(doc(collection(db,'users',uid,'tasks')),{...baseTask,date,repeatGroupId:groupId});});await batch.commit();}
    selDate=startStr;
    toast(`${dates.length}件の繰り返しタスクを追加したよ📝`);
  }
  document.getElementById('add-overlay').classList.remove('open');
};

  const date=document.getElementById('sc-date').value;
  if(!date){toast('日にちを選んでね','bad');return;}
  await addDoc(collection(db,'users',getUid(),'schedules'),{name,date,time:document.getElementById('sc-time').value||null,memo:document.getElementById('sc-memo').value.trim()||null,createdAt:Date.now()});
  selDate=date;
  document.getElementById('schedule-overlay').classList.remove('open');
  toast('よていを追加したよ📌');
};
window.openTrackerModal=function(){document.getElementById('tr-name').value='';document.getElementById('tr-unit').value='';document.getElementById('tr-goal').value=100;document.getElementById('tracker-overlay').classList.add('open');};
window.addTracker=async function(){
  if(!currentUser)return;
  const name=document.getElementById('tr-name').value.trim();
  if(!name){toast('トラッカー名を入力してね！','bad');return;}
  await addDoc(collection(db,'users',getUid(),'trackers'),{name,unit:document.getElementById('tr-unit').value.trim()||'',goal:parseInt(document.getElementById('tr-goal').value)||100,current:0,createdAt:Date.now()});
  document.getElementById('tracker-overlay').classList.remove('open');
  toast('トラッカーを追加したよ📊');
};

window.showTab=function(tab){
  if(tab==='parent'&&!isParent){toast('保護者専用ページです','bad');return;}
  const tabs=['home','tasks','rewards','schedule','parent'];
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',tabs[i]===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('fab').style.display=(tab==='parent')?'flex':'none';
  if(tab==='rewards'&&!isParent){
    rewardRequests.filter(r=>r.status==='approved'&&!r.childRead).forEach(r=>{updateDoc(doc(db,'users',currentUser.uid,'rewardRequests',r.id),{childRead:true});});
  }
};

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2400);
}
function initCalendar(){const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();selDate=todayStr();renderAll();}
setInterval(()=>{if(currentUser){checkPenalties();renderAll();}},60000);
</script>
